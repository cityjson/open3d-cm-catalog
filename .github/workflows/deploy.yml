name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and verify the deployment's origin.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Astro
        uses: withastro/action@v4
        # withastro/action detects pnpm from packageManager, installs,
        # runs `astro build`, and uploads the Pages artifact from ./dist.
        env:
          # Site is served at the custom domain root (catalog.open3d.city),
          # not the /open3d-cm-catalog/ GitHub Pages project-site subpath.
          PUBLIC_BASE: /

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
